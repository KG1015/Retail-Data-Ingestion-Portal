<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Ingestion Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
  <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <h1 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">
        Retail Data Ingestion Portal
      </h1>
      <p class="mt-4 text-lg text-gray-500">
        Upload your master data and mappings below. Process in order: Stores, Users, then PJP.
      </p>
    </div>

    <!-- Stores Upload, will be done through this code -->
    <div class="bg-white shadow overflow-hidden sm:rounded-lg mb-8">
      <div class="px-4 py-5 sm:px-6 bg-blue-50">
        <h3 class="text-lg leading-6 font-medium text-gray-900">Step 1: Stores Master Data</h3>
      </div>
      <div class="border-t border-gray-200 px-4 py-5 sm:p-6">
        <form id="storesForm" class="flex items-center space-x-4">
          <input type="file" id="storesFile" accept=".csv" required class="flex-1 border p-2 rounded">
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Upload
            Stores</button>
        </form>
        <div id="storesResult" class="mt-4 text-sm hidden"></div>
      </div>
    </div>

    <!-- Users Upload, will be done through this code -->
    <div class="bg-white shadow overflow-hidden sm:rounded-lg mb-8">
      <div class="px-4 py-5 sm:px-6 bg-pink-50">
        <h3 class="text-lg leading-6 font-medium text-gray-900">Step 2: Users Master Data</h3>
      </div>
      <div class="border-t border-gray-200 px-4 py-5 sm:p-6">
        <form id="usersForm" class="flex items-center space-x-4">
          <input type="file" id="usersFile" accept=".csv" required class="flex-1 border p-2 rounded">
          <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-2 px-4 rounded">Upload
            Users</button>
        </form>
        <div id="usersResult" class="mt-4 text-sm hidden"></div>
      </div>
    </div>

    <!-- PJP Upload, will be done through this code -->
    <div class="bg-white shadow overflow-hidden sm:rounded-lg mb-8">
      <div class="px-4 py-5 sm:px-6 bg-purple-50">
        <h3 class="text-lg leading-6 font-medium text-gray-900">Step 3: Store-User Mapping (PJP)</h3>
      </div>
      <div class="border-t border-gray-200 px-4 py-5 sm:p-6">
        <form id="pjpForm" class="flex items-center space-x-4">
          <input type="file" id="pjpFile" accept=".csv" required class="flex-1 border p-2 rounded">
          <button type="submit" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded">Upload
            Mapping</button>
        </form>
        <div id="pjpResult" class="mt-4 text-sm hidden"></div>
      </div>
    </div>
  </div>

  <script>
    async function handleUpload(formId, fileInputId, resultDivId, endpoint) {
      const form = document.getElementById(formId);
      const fileInput = document.getElementById(fileInputId);
      const resultDiv = document.getElementById(resultDivId);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = fileInput.files[0];
        if (!file) return;

        resultDiv.classList.remove('hidden');
        resultDiv.className = 'mt-4 text-sm text-gray-700';
        resultDiv.innerHTML = 'Uploading and processing, please wait...';

        const formData = new FormData();
        formData.append('file', file);

        try {
          const startTime = performance.now();
          const response = await fetch(endpoint, {
            method: 'POST',
            body: formData
          });
          const endTime = performance.now();
          const data = await response.json();

          if (response.ok) {
            let html = `<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative">
              <strong>Success!</strong> Indexed ${data.successCount} rows. Failed ${data.errorCount} rows.
              <br/>Time Taken: ${((endTime - startTime) / 1000).toFixed(2)} seconds.
            </div>`;

            if (data.errors && data.errors.length > 0) {
              html += `<div class="mt-4"><h4 class="font-bold">Errors (first ${data.errors.length}):</h4>
                <div class="max-h-64 overflow-y-auto mt-2 bg-gray-100 p-2 border"><pre class="text-xs">${JSON.stringify(data.errors, null, 2)}</pre></div>
              </div>`;
            }
            resultDiv.innerHTML = html;
          } else {
            resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
              <strong>Error!</strong> ${data.error || 'Unknown error occurred'}
            </div>`;
          }
        } catch (err) {
          resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
            <strong>Network Error!</strong> ${err.message}
          </div>`;
        }
      });
    }

    handleUpload('storesForm', 'storesFile', 'storesResult', '/api/upload/stores');
    handleUpload('usersForm', 'usersFile', 'usersResult', '/api/upload/users');
    handleUpload('pjpForm', 'pjpFile', 'pjpResult', '/api/upload/pjp');
  </script>
</body>

</html>
